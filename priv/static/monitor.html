<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><circle cx='8' cy='8' r='7' fill='%23e94560'/></svg>">
<title>Giulia Logic Monitor</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #1a1a2e;
    color: #e0e0e0;
    font-family: 'Cascadia Code', 'Fira Code', 'JetBrains Mono', monospace;
    font-size: 13px;
    line-height: 1.5;
  }

  .header {
    background: #16213e;
    border-bottom: 1px solid #0f3460;
    padding: 10px 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .header h1 { font-size: 15px; color: #e94560; font-weight: 600; }
  .header .subtitle { color: #555; font-size: 11px; margin-left: 8px; }

  .stats-bar { display: flex; gap: 20px; align-items: center; }
  .stat { display: flex; align-items: center; gap: 5px; }
  .stat-label { color: #555; font-size: 10px; text-transform: uppercase; }
  .stat-value { color: #e0e0e0; font-weight: 600; font-size: 13px; }

  .controls { display: flex; gap: 6px; align-items: center; }
  .controls button {
    background: #0f3460; color: #e0e0e0; border: 1px solid #1a4a8a;
    padding: 3px 10px; border-radius: 3px; cursor: pointer;
    font-family: inherit; font-size: 10px;
  }
  .controls button:hover { background: #1a4a8a; }
  .controls button.active { background: #e94560; border-color: #e94560; }
  .filter-btn.off { opacity: 0.35; }

  .dot {
    display: inline-block; width: 7px; height: 7px;
    border-radius: 50%; margin-right: 5px;
  }
  .dot.on  { background: #53d769; }
  .dot.off { background: #e94560; }
  .dot.wait { background: #ffa726; animation: pulse 1s infinite; }
  @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.3; } }

  /* Layout */
  .main {
    display: grid;
    grid-template-columns: 1fr 380px;
    height: calc(100vh - 73px);
  }

  .event-log {
    overflow-y: auto;
    padding: 4px 0;
    border-right: 1px solid #0f3460;
  }

  /* Event rows */
  .ev {
    padding: 3px 12px;
    display: flex;
    align-items: baseline;
    gap: 0;
    cursor: pointer;
    border-bottom: 1px solid rgba(255,255,255,0.02);
    font-size: 12px;
  }
  .ev:hover { background: rgba(255,255,255,0.03); }
  .ev.open { background: rgba(255,255,255,0.05); }

  .ev-time { color: #444; width: 70px; flex-shrink: 0; font-size: 11px; }

  .ev-badge {
    font-size: 9px; padding: 1px 5px; border-radius: 2px;
    font-weight: 700; width: 42px; text-align: center; flex-shrink: 0;
    margin-right: 8px;
  }
  .b-api  { background: rgba(187,134,252,0.2); color: #bb86fc; }
  .b-ooda { background: rgba(255,167,38,0.2);  color: #ffa726; }
  .b-llm  { background: rgba(83,215,105,0.2);  color: #53d769; }
  .b-tool { background: rgba(66,165,245,0.2);  color: #42a5f5; }

  .ev-method {
    font-weight: 700; width: 42px; flex-shrink: 0;
  }
  .m-GET    { color: #53d769; }
  .m-POST   { color: #ffa726; }
  .m-PUT    { color: #42a5f5; }
  .m-DELETE  { color: #e94560; }
  .m-PATCH  { color: #bb86fc; }

  .ev-path {
    flex: 1;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    color: #ccc;
  }

  .ev-status {
    width: 32px; text-align: right; flex-shrink: 0;
    margin-left: 8px; font-weight: 600; font-size: 11px;
  }
  .s-2 { color: #53d769; }
  .s-4 { color: #ffa726; }
  .s-5 { color: #e94560; }

  .ev-dur {
    width: 65px; text-align: right; flex-shrink: 0;
    margin-left: 8px; font-size: 11px;
  }
  .d-fast   { color: #53d769; }
  .d-medium { color: #ffa726; }
  .d-slow   { color: #e94560; }

  /* OODA/LLM/TOOL summary text */
  .ev-text {
    flex: 1; color: #aaa;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }

  /* Expanded detail */
  .ev-detail {
    display: none;
    padding: 6px 12px 8px 122px;
    background: #0d1117;
    font-size: 11px;
    color: #8b949e;
    white-space: pre-wrap;
    word-break: break-all;
    max-height: 350px;
    overflow-y: auto;
    border-bottom: 1px solid rgba(255,255,255,0.04);
  }
  .ev.open + .ev-detail { display: block; }

  /* Right panel */
  .right-panel { display: flex; flex-direction: column; overflow: hidden; }

  .panel-header {
    background: #16213e;
    border-bottom: 1px solid #0f3460;
    padding: 7px 12px;
    display: flex; gap: 12px;
  }
  .panel-tab {
    cursor: pointer; padding: 2px 8px; border-radius: 3px;
    color: #555; font-size: 11px;
  }
  .panel-tab.active { color: #ffa726; background: rgba(255,167,38,0.1); }

  .panel-content { flex: 1; overflow: hidden; }
  .panel-section {
    display: none; height: 100%; overflow-y: auto; padding: 10px;
    font-size: 11px; color: #8b949e; white-space: pre-wrap;
  }
  .panel-section.active { display: block; }

  .resp-block {
    margin-bottom: 10px; padding: 6px 10px;
    border-left: 3px solid #bb86fc;
    background: rgba(187,134,252,0.04);
  }
  .resp-head {
    color: #bb86fc; font-size: 10px; margin-bottom: 3px; font-weight: 600;
  }
  .resp-body {
    color: #7b8794; font-size: 11px; max-height: 280px;
    overflow-y: auto; white-space: pre-wrap; word-break: break-all;
  }

  .think-block {
    margin-bottom: 12px; padding: 6px 10px;
    border-left: 3px solid #ffa726;
    background: rgba(255,167,38,0.04);
  }
  .think-time { color: #555; font-size: 10px; margin-bottom: 3px; }

  /* Exclusion bar */
  .excl-bar {
    background: #121a2e;
    border-bottom: 1px solid #0f3460;
    padding: 4px 20px;
    display: flex;
    align-items: center;
    gap: 6px;
    min-height: 28px;
    flex-wrap: wrap;
  }
  .excl-bar label { color: #555; font-size: 10px; text-transform: uppercase; margin-right: 4px; }
  .excl-input {
    background: #0d1117; color: #ccc; border: 1px solid #1a4a8a;
    padding: 2px 8px; border-radius: 3px; font-family: inherit;
    font-size: 11px; width: 180px;
  }
  .excl-input::placeholder { color: #333; }
  .excl-add {
    background: #0f3460; color: #e0e0e0; border: 1px solid #1a4a8a;
    padding: 2px 8px; border-radius: 3px; cursor: pointer;
    font-family: inherit; font-size: 10px;
  }
  .excl-add:hover { background: #1a4a8a; }
  .excl-tag {
    display: inline-flex; align-items: center; gap: 4px;
    background: rgba(233,69,96,0.15); color: #e94560;
    padding: 1px 8px; border-radius: 3px; font-size: 10px;
  }
  .excl-tag .x {
    cursor: pointer; font-weight: 700; margin-left: 2px;
    opacity: 0.7;
  }
  .excl-tag .x:hover { opacity: 1; }

  .empty-msg {
    display: flex; flex-direction: column; align-items: center;
    justify-content: center; height: 100%; color: #333;
    font-size: 13px;
  }
  .empty-msg .hint { font-size: 11px; margin-top: 6px; color: #2a2a3e; }
</style>
</head>
<body>

<div class="header">
  <div style="display:flex;align-items:center">
    <h1>Giulia Logic Monitor</h1>
    <span class="subtitle">Build 96</span>
  </div>
  <div class="stats-bar">
    <div class="stat">
      <span class="stat-label">Requests</span>
      <span class="stat-value" id="s-req" style="color:#bb86fc">0</span>
    </div>
    <div class="stat">
      <span class="stat-label">Events</span>
      <span class="stat-value" id="s-evt">0</span>
    </div>
  </div>
  <div class="controls">
    <span class="dot wait" id="dot"></span>
    <span id="conn" style="font-size:11px;color:#666">Connecting</span>
    <button class="filter-btn" data-cat="api">API</button>
    <button class="filter-btn" data-cat="ooda">OODA</button>
    <button class="filter-btn" data-cat="llm">LLM</button>
    <button class="filter-btn" data-cat="tool">TOOL</button>
    <button id="btn-pause">Pause</button>
    <button id="btn-clear">Clear</button>
  </div>
</div>

<div class="excl-bar" id="excl-bar">
  <label>Exclude:</label>
  <input class="excl-input" id="excl-input" placeholder="/health, /api/monitor/..." />
  <button class="excl-add" id="excl-add">+</button>
  <span id="excl-tags"></span>
</div>

<div class="main">
  <div class="event-log" id="log">
    <div class="empty-msg" id="empty">
      Waiting for events...
      <div class="hint">Every REST call to Giulia appears here in real-time.</div>
    </div>
  </div>
  <div class="right-panel">
    <div class="panel-header">
      <span class="panel-tab active" data-panel="responses">Responses</span>
      <span class="panel-tab" data-panel="think">Think Stream</span>
    </div>
    <div class="panel-content">
      <div class="panel-section active" id="p-resp">
        <div style="color:#333;text-align:center;margin-top:40px">
          Click an API event to see its response body.
        </div>
      </div>
      <div class="panel-section" id="p-think">
        <div style="color:#333;text-align:center;margin-top:40px">
          LLM &lt;think&gt; blocks appear here during inference.
        </div>
      </div>
    </div>
  </div>
</div>

<script>
(function() {
  var log = document.getElementById('log');
  var empty = document.getElementById('empty');
  var dot = document.getElementById('dot');
  var connLabel = document.getElementById('conn');
  var sReq = document.getElementById('s-req');
  var sEvt = document.getElementById('s-evt');
  var pResp = document.getElementById('p-resp');
  var pThink = document.getElementById('p-think');

  var paused = false, pending = [];
  var reqCount = 0, evtCount = 0;
  var autoScroll = true;
  var respReady = false, thinkReady = false;

  // Endpoint exclusion list (persisted in localStorage)
  var EXCL_KEY = 'giulia_monitor_excludes';
  var excludes = JSON.parse(localStorage.getItem(EXCL_KEY) || '[]');
  var exclInput = document.getElementById('excl-input');
  var exclTags = document.getElementById('excl-tags');

  function saveExcludes() {
    localStorage.setItem(EXCL_KEY, JSON.stringify(excludes));
  }

  function addExclude(path) {
    path = path.trim();
    if (!path || excludes.indexOf(path) !== -1) return;
    excludes.push(path);
    saveExcludes();
    renderExclTags();
  }

  function removeExclude(path) {
    excludes = excludes.filter(function(p) { return p !== path; });
    saveExcludes();
    renderExclTags();
  }

  function isExcluded(evPath) {
    if (!evPath) return false;
    for (var i = 0; i < excludes.length; i++) {
      if (evPath === excludes[i] || evPath.indexOf(excludes[i]) === 0) return true;
    }
    return false;
  }

  function renderExclTags() {
    exclTags.innerHTML = '';
    excludes.forEach(function(p) {
      var tag = document.createElement('span');
      tag.className = 'excl-tag';
      tag.innerHTML = esc(p) + '<span class="x">&times;</span>';
      tag.querySelector('.x').addEventListener('click', function() { removeExclude(p); });
      exclTags.appendChild(tag);
    });
  }

  document.getElementById('excl-add').addEventListener('click', function() {
    addExclude(exclInput.value);
    exclInput.value = '';
  });

  exclInput.addEventListener('keydown', function(e) {
    if (e.key === 'Enter') {
      addExclude(exclInput.value);
      exclInput.value = '';
    }
  });

  renderExclTags();

  // Filters
  var filters = { api: true, ooda: true, llm: true, tool: true };

  document.querySelectorAll('.filter-btn').forEach(function(b) {
    b.addEventListener('click', function() {
      var c = b.dataset.cat;
      filters[c] = !filters[c];
      b.classList.toggle('off', !filters[c]);
      // Re-apply visibility (only event rows, not the buttons themselves)
      log.querySelectorAll('.ev[data-cat]').forEach(function(el) {
        el.style.display = !filters[el.dataset.cat] ? 'none' : '';
        // Also hide/show the detail div that follows
        if (el.nextElementSibling && el.nextElementSibling.classList.contains('ev-detail')) {
          el.nextElementSibling.style.display = !filters[el.dataset.cat] ? 'none' : '';
        }
      });
    });
  });

  // Panel tabs
  document.querySelectorAll('.panel-tab').forEach(function(t) {
    t.addEventListener('click', function() {
      document.querySelectorAll('.panel-tab').forEach(function(x) { x.classList.remove('active'); });
      document.querySelectorAll('.panel-section').forEach(function(x) { x.classList.remove('active'); });
      t.classList.add('active');
      document.getElementById('p-' + t.dataset.panel).classList.add('active');
    });
  });

  // SSE
  function connect() {
    dot.className = 'dot wait';
    connLabel.textContent = 'Connecting';
    var es = new EventSource('/api/monitor/stream');
    es.onopen = function() { dot.className = 'dot on'; connLabel.textContent = 'Live'; };
    es.addEventListener('event', function(e) {
      try {
        var d = JSON.parse(e.data);
        if (paused) pending.push(d);
        else render(d);
      } catch(err) {}
    });
    es.addEventListener('connected', function() {
      dot.className = 'dot on'; connLabel.textContent = 'Live';
    });
    es.onerror = function() {
      dot.className = 'dot off'; connLabel.textContent = 'Disconnected';
      es.close();
      setTimeout(connect, 3000);
    };
  }

  // History backfill
  function loadHistory() {
    fetch('/api/monitor/history')
      .then(function(r) { return r.json(); })
      .then(function(d) {
        if (d.events) d.events.forEach(render);
      }).catch(function() {});
  }

  // Render one event
  function render(ev) {
    if (!ev || !ev.event) return;

    // Skip http.start entirely (should not arrive anymore, but guard)
    if (ev.event === 'giulia.http.start') return;

    if (empty && empty.parentNode) empty.remove();
    evtCount++;
    sEvt.textContent = evtCount;

    var cat = categorize(ev.event);
    var meta = ev.metadata || {};
    var meas = ev.measurements || {};

    // Think stream
    if (meta.think) addThink(meta.think, ev.timestamp);

    // HTTP request (the main case)
    if (ev.event === 'giulia.http.stop') {
      reqCount++;
      sReq.textContent = reqCount;
      renderHttp(ev, cat, meta, meas);
      return;
    }

    // Internal events (OODA, LLM, TOOL)
    renderInternal(ev, cat, meta, meas);
  }

  function renderHttp(ev, cat, meta, meas) {
    var method = meta.method || '?';
    var rawPath = meta.path || '/';
    var path = rawPath;
    var qs = meta.query_string;
    if (qs) path += '?' + qs;
    var status = meta.status || 0;
    var dur = meas.duration_ms;

    // Exclusion check (match against raw path without query string)
    if (isExcluded(rawPath)) return;

    // Status class
    var sc = status >= 500 ? 's-5' : status >= 400 ? 's-4' : 's-2';
    // Duration class
    var dc = 'd-fast';
    if (dur > 1000) dc = 'd-slow';
    else if (dur > 100) dc = 'd-medium';

    // Row
    var row = document.createElement('div');
    row.className = 'ev';
    row.dataset.cat = cat;
    if (!filters[cat]) row.style.display = 'none';

    row.innerHTML =
      '<span class="ev-time">' + fmtTime(ev.timestamp) + '</span>' +
      '<span class="ev-badge b-api">API</span>' +
      '<span class="ev-method m-' + method + '">' + method + '</span>' +
      '<span class="ev-path">' + esc(path) + '</span>' +
      '<span class="ev-status ' + sc + '">' + status + '</span>' +
      '<span class="ev-dur ' + dc + '">' + (dur !== undefined ? dur + 'ms' : '') + '</span>';

    // Detail (response body, pretty-printed)
    var detail = document.createElement('div');
    detail.className = 'ev-detail';
    if (meta.resp_body) {
      try {
        var parsed = JSON.parse(meta.resp_body);
        detail.textContent = JSON.stringify(parsed, null, 2);
      } catch(e) {
        detail.textContent = meta.resp_body;
      }
    } else {
      detail.textContent = '(no response body)';
    }

    row.addEventListener('click', function() {
      row.classList.toggle('open');
      // Also show in Responses panel
      if (meta.resp_body) addResponse(ev);
    });

    // Right-click to exclude this path
    row.addEventListener('contextmenu', function(e) {
      e.preventDefault();
      addExclude(rawPath);
      row.style.display = 'none';
      if (row.nextElementSibling && row.nextElementSibling.classList.contains('ev-detail')) {
        row.nextElementSibling.style.display = 'none';
      }
    });

    log.appendChild(row);
    log.appendChild(detail);
    if (autoScroll) log.scrollTop = log.scrollHeight;
  }

  function renderInternal(ev, cat, meta, meas) {
    var row = document.createElement('div');
    row.className = 'ev';
    row.dataset.cat = cat;
    if (!filters[cat]) row.style.display = 'none';

    var badge = cat === 'ooda' ? 'b-ooda' : cat === 'llm' ? 'b-llm' : cat === 'tool' ? 'b-tool' : 'b-api';
    var label = cat.toUpperCase();
    var text = internalSummary(ev, meta, meas);
    var dur = meas.duration_ms;
    var dc = 'd-fast';
    if (dur > 1000) dc = 'd-slow';
    else if (dur > 100) dc = 'd-medium';

    row.innerHTML =
      '<span class="ev-time">' + fmtTime(ev.timestamp) + '</span>' +
      '<span class="ev-badge ' + badge + '">' + label + '</span>' +
      '<span class="ev-text">' + esc(text) + '</span>' +
      (dur !== undefined ? '<span class="ev-dur ' + dc + '">' + dur + 'ms</span>' : '');

    // Detail
    var detail = document.createElement('div');
    detail.className = 'ev-detail';
    var parts = [];
    if (Object.keys(meas).length) {
      var cleanMeas = Object.assign({}, meas);
      delete cleanMeas.system_time;
      if (Object.keys(cleanMeas).length) parts.push(JSON.stringify(cleanMeas, null, 2));
    }
    if (Object.keys(meta).length) {
      var cleanMeta = Object.assign({}, meta);
      delete cleanMeta.think;
      if (Object.keys(cleanMeta).length) parts.push(JSON.stringify(cleanMeta, null, 2));
    }
    detail.textContent = parts.join('\n') || '(no details)';

    row.addEventListener('click', function() { row.classList.toggle('open'); });

    log.appendChild(row);
    log.appendChild(detail);
    if (autoScroll) log.scrollTop = log.scrollHeight;
  }

  function internalSummary(ev, meta, meas) {
    switch (ev.event) {
      case 'giulia.ooda.start':
        return 'Session started' + (meta.provider ? '  [' + meta.provider + ']' : '');
      case 'giulia.ooda.step':
        return 'Iteration ' + (meas.iteration || '?');
      case 'giulia.ooda.done':
        return 'Done  (' + (meas.total_iterations || '?') + ' iters, ' + (meta.result_type || '?') + ')';
      case 'giulia.llm.call':
        return 'Provider call  [' + (meta.status || '?') + ']';
      case 'giulia.llm.parsed':
        return 'Parsed: ' + (meta.result_type || '?') + (meta.tool ? ' -> ' + meta.tool : '');
      case 'giulia.tool.start':
        return (meta.tool || '?') + '  started';
      case 'giulia.tool.stop':
        return (meta.tool || '?') + (meta.success ? '  OK' : '  FAILED');
      default:
        return ev.event;
    }
  }

  function addResponse(ev) {
    var meta = ev.metadata || {};
    if (!respReady) { pResp.innerHTML = ''; respReady = true; }
    var b = document.createElement('div');
    b.className = 'resp-block';
    var hdr = (meta.method || '?') + ' ' + (meta.path || '?');
    if (meta.query_string) hdr += '?' + meta.query_string;
    hdr += '  [' + (meta.status || '?') + ']';
    var dur = (ev.measurements || {}).duration_ms;
    if (dur !== undefined) hdr += '  ' + dur + 'ms';

    b.innerHTML =
      '<div class="resp-head">' + fmtTime(ev.timestamp) + '  ' + esc(hdr) + '</div>' +
      '<div class="resp-body"></div>';
    var bodyEl = b.querySelector('.resp-body');
    try {
      bodyEl.textContent = JSON.stringify(JSON.parse(meta.resp_body), null, 2);
    } catch(e) {
      bodyEl.textContent = meta.resp_body || '(empty)';
    }
    pResp.appendChild(b);
    pResp.scrollTop = pResp.scrollHeight;
  }

  function addThink(text, ts) {
    if (!thinkReady) { pThink.innerHTML = ''; thinkReady = true; }
    var b = document.createElement('div');
    b.className = 'think-block';
    b.innerHTML = '<div class="think-time">' + fmtTime(ts) + '</div>';
    var t = document.createElement('div');
    t.textContent = text;
    b.appendChild(t);
    pThink.appendChild(b);
    pThink.scrollTop = pThink.scrollHeight;
  }

  function categorize(e) {
    if (e.indexOf('http') !== -1)  return 'api';
    if (e.indexOf('ooda') !== -1)  return 'ooda';
    if (e.indexOf('llm') !== -1)   return 'llm';
    if (e.indexOf('tool') !== -1)  return 'tool';
    return 'api';
  }

  function fmtTime(ts) {
    if (!ts) return '--:--:--';
    try {
      // Handle Elixir DateTime format (space instead of T)
      var s = String(ts);
      if (s.indexOf('T') === -1 && s.indexOf(' ') > 0) s = s.replace(' ', 'T');
      return new Date(s).toLocaleTimeString('en-GB', { hour12: false });
    } catch(e) { return '--:--:--'; }
  }

  function esc(s) {
    if (!s) return '';
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  // Controls
  document.getElementById('btn-pause').onclick = function() {
    paused = !paused;
    this.textContent = paused ? 'Resume' : 'Pause';
    this.classList.toggle('active', paused);
    if (!paused) { pending.forEach(render); pending = []; }
  };

  document.getElementById('btn-clear').onclick = function() {
    log.innerHTML = '';
    evtCount = 0; reqCount = 0;
    sEvt.textContent = '0'; sReq.textContent = '0';
    pResp.innerHTML = ''; pThink.innerHTML = '';
    respReady = false; thinkReady = false;
  };

  log.addEventListener('scroll', function() {
    autoScroll = log.scrollHeight - log.scrollTop - log.clientHeight < 40;
  });

  // Init
  loadHistory();
  connect();
})();
</script>
</body>
